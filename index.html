<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black">
        <title>Weather Report</title>
        <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
        <link rel="apple-touch-icon" href="images/apple-touch-icon-iphone-60x60.png">
        <link rel="apple-touch-icon" sizes="60x60" href="images/apple-touch-icon-ipad-76x76.png">
        <link rel="apple-touch-icon" sizes="114x114" href="images/apple-touch-icon-iphone-retina-120x120.png">
        <link rel="apple-touch-icon" sizes="144x144" href="images/apple-touch-icon-ipad-retina-152x152.png">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
        <link rel="stylesheet" href="path/to/font-awesome/css/font-awesome.min.css">
    </head>
    <body class="bg-dark">
        <div id="divWeather" class="row d-flex justify-content-center">
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script>
            const strBaseURL=`https://api.open-meteo.com/v1/forecast?latitude=36.1682&longitude=-85.5016&current=temperature_2m,relative_humidity_2m,precipitation,weather_code&timezone=America%2FChicago&wind_speed_unit=mph&temperature_unit=fahrenheit&precipitation_unit=inch`
            fetch(strBaseURL)
            .then(response =>{
                if(!response.ok)
                {
                    throw new console.error('Bad HTTP Response')
                }
                return response.json()
            })
            .then(data => {
                arrWeather = data
                let strWeatherIcon
                let strWeatherStatus
                if(arrWeather.current.weather_code == 0)
                {
                    strWeatherStatus = "Sunny"
                    strWeatherIcon = "bi bi-brightness-high"
                } else if(arrWeather.current.weather_code == 1 | arrWeather.current.weather_code == 2 | arrWeather.current.weather_code == 3)
                {
                    strWeatherStatus = "Cloudy"
                    strWeatherIcon = "bi bi-cloud-fill"
                } else if(arrWeather.current.weather_code == 61 | arrWeather.current.weather_code == 63 | arrWeather.current.weather_code == 65)
                {
                    strWeatherStatus = "Raining"
                    strWeatherIcon = "bi bi-cloud-drizzle-fill"
                } else if(arrWeather.current.weather_code == 71 | arrWeather.current.weather_code == 73 | arrWeather.current.weather_code == 75)
                {
                    strWeatherStatus = "Snowing"
                    strWeatherIcon = "bi bi-cloud-snow-fill"
                } else if(arrWeather.current.weather_code == 95)
                {
                    strWeatherStatus = "Thunderstorms"
                    strWeatherIcon = "bi bi-cloud-lightning-rain-fill"
                }
                document.querySelector('#divWeather').innerHTML += `<div class="col-md-8 col-lg-6 col-xl-5"><div class="card text-body">
                    <div class="card-body">

                        <div class="d-flex">
                            <h6 class="flex-grow-1">Cookeville</h6>
                        </div>

                        <div class="d-flex flex-column text-center mt-5 mb-4">
                            <i class="${strWeatherIcon}" style="font-size: 100px"></i>
                        <h6 class="display-4 mb-0 font-weight-bold"> ${arrWeather.current.temperature_2m} </h6>
                        ${strWeatherStatus}
                        </div>

                        <div class="d-flex align-items-center">
                            <div class="flex-grow-1">
                                <div><i class="bi bi-moisture" style="font-size: 15px"></i> ${arrWeather.current.relative_humidity_2m}%
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

            </div>`
                })

        </script>
    </body>
</html>
